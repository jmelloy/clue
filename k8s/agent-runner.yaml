apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runner
  namespace: clue
  labels:
    app: agent-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-runner
  template:
    metadata:
      labels:
        app: agent-runner
    spec:
      containers:
        - name: agent-runner
          # Same image as the backend — just a different entrypoint
          image: clue-backend:latest
          command: ["python", "agent_runner.py"]
          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: BACKEND_URL
              value: http://backend:8000
            - name: AGENT_POLL_INTERVAL
              value: "2"
            - name: AGENT_TRACE
              value: "true"
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: LLM_TRACE_LOG_LEVEL
              value: "DEBUG"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LLM_API_KEY
            - name: LLM_MODEL
              value: "gpt-5-mini"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
