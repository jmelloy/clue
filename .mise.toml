[tools]
node = "latest"
uv = "latest"

[settings]
python.uv_venv_auto = "create|source"

[env]
_.python.venv = { path = "backend/.venv", create = true}


[tasks.install]
description = "Create and install backend + frontend dependencies"
run = """
cd backend
uv sync
cd ../frontend
npm install
"""

[tasks.worktree]
description = "Create a git worktree (usage arg): mise run worktree <branch>"
usage = '''
arg "<branch>" help="Branch name"
'''
run = """
branch="$usage_branch"
path=".worktree/$branch"

mkdir -p "$(dirname "$path")"
if [ -e "$path" ]; then
	echo "Worktree path already exists: $path"
	echo "Use: mise run worktree-rm $branch"
	exit 1
fi
if git rev-parse --verify --quiet "$branch^{commit}" >/dev/null; then
	git worktree add "$path" "$branch"
else
	git worktree add -b "$branch" "$path" HEAD
fi
cd "$path"
mise trust
mise run install
"""

[tasks.worktree-rm]
description = "Remove a git worktree (usage arg): mise run worktree-rm <branch>"
usage = '''
arg "<branch>" help="Branch name"
'''
run = """
branch="$usage_branch"
path=".worktree/$branch"

git worktree remove "$path"
"""

