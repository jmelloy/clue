name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}-frontend

jobs:
  test:
    name: Test
    uses: ./.github/workflows/ci.yml

  build-backend:
    name: Build Backend Image
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Kubernetes
    needs: [build-backend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connectivity
        run: kubectl cluster-info
        
      - name: Create namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Deploy Redis
        run: kubectl apply -n clue -f k8s/redis.yaml

      - name: Deploy backend
        run: |
          sed "s|image: clue-backend:.*|image: ${{ env.BACKEND_IMAGE }}:${{ needs.build-backend.outputs.image-tag }}|" k8s/backend.yaml \
            | kubectl apply -n clue -f -

      - name: Apply ingress
        run: kubectl apply -n clue -f k8s/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status -n clue deployment/redis --timeout=120s
          kubectl rollout status -n clue deployment/backend --timeout=120s
          kubectl rollout status -n clue deployment/frontend --timeout=120s

      - name: Show deployment status
        if: always()
        run: kubectl get pods -n clue
