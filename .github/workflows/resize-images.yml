name: Resize Images

on:
  push:
    branches: [main]
    paths:
      - "frontend/public/images/**"
    

concurrency:
  group: resize-images
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  thumbnails:
    name: Generate Thumbnails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Generate thumbnails
        run: bash scripts/resize_thumbnails.sh

      - name: Commit thumbnails
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain frontend/public/images/)" ]; then
            echo "No thumbnail changes to commit"
          else
            git add frontend/public/images/
            git commit -m "chore: regenerate image thumbnails [skip ci]"
            git push
          fi
